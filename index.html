<!DOCTYPE html>
<html>
<head>
    <title>DrawAI Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
        }

        h1 {
            color: #22c55e;
        }
    </style>
</head>
<body>

<h1>⚽ DrawAI Predictor</h1>

<div class="card">
    <h2>10-Minute Draw Analyzer</h2>
    <p>AI-powered football prediction system.</p>

    <button onclick="analyzeMatch()">
        Analyze Match
    </button>

    <h3 id="result"></h3>
</div>

<script>
function analyzeMatch() {
    let score = Math.floor(Math.random() * 30) + 70;

    document.getElementById("result").innerHTML =
        "Confidence Score: " + score + "%";
}
</script>

</body>
</html>
